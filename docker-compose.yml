version: '3.8'

services:
  # Redis service with built-in healthcheck
  redis:
    image: redis:7-alpine
    container_name: cadence_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # Django Web Server
  web:
    build: .
    container_name: cadence_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn cadence_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # Celery Background Worker
  celery_worker:
    build: .
    container_name: cadence_worker
    command: celery -A cadence_project worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # Celery Beat Scheduler
  celery_beat:
    build: .
    container_name: cadence_beat
    command: celery -A cadence_project beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: always
